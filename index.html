<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CRUD DB</title>
</head>
<body>

<h2>Inserisci nuovo record</h2>
<input type="text" id="nome" placeholder="Nome">
<input type="number" id="valore" placeholder="Valore">
<button onclick="crea()">Crea</button>

<h2>Elenco dati</h2>
<button onclick="carica()">Carica Dati</button>
<ul id="lista"></ul>

<script>
const API = "api.php";

// CREATE
function crea(){
    const nome = document.getElementById("nome").value.trim();
    const valore = document.getElementById("valore").value;

    if(nome === "" || valore === ""){
        alert("Compila tutti i campi!");
        return;
    }

    fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ nome, valore })
    })
    .then(res => res.json())
    .then(data => {
        alert("Creato ID: " + data.id);
        carica();
    });
}

// READ
function carica(){
    fetch(API)
    .then(res => res.json())
    .then(data => {
        let lista = document.getElementById("lista");
        lista.innerHTML = "";

        data.forEach(item => {
            lista.innerHTML += `
                <li>
                    ${item.id} - ${item.nome} - ${item.valore}
                    <button onclick="modifica(${item.id})">Modifica</button>
                    <button onclick="elimina(${item.id})">Elimina</button>
                </li>
            `;
        });
    });
}

carica();

// DELETE
function elimina(id){
    if(!confirm("Sicuro?")) return;

    fetch(API + "?id=" + id, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(() => carica());
}

// UPDATE
function modifica(id){
    let nome = prompt("Nuovo nome:");
    let valore = prompt("Nuovo valore:");

    if(nome === null || valore === null) return;

    fetch(API + "?id=" + id, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ nome, valore })
    })
    .then(res => res.json())
    .then(() => {
        alert("Aggiornato!");
        carica();
    });
}
</script>

</body>
</html>
